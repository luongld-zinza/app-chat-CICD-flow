name: CI/CD Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: app-chat
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chat-server:latest

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chat-client:latest

  deploy:
    name: Deploy to Ubuntu Server
    needs: build-and-push # Quan trọng: Chỉ chạy khi đã push Image lên Docker Hub thành công
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}         # IP của máy Ubuntu (hoặc Domain/Tunnel)
          username: ${{ secrets.SSH_USER }}     # Username (ví dụ: duczz)
          key: ${{ secrets.SSH_PRIVATE_KEY }}   # Nội dung file id_rsa đã lấy từ máy Ubuntu
          port: 22                              # Port SSH mặc định
          script: |
            # 1. Di chuyển vào thư mục chứa project trên Server
            cd /home/${{ secrets.SSH_USER }}/Documents/app-chat-CICD-flow
            
            # 2. Đăng nhập Docker Hub (nếu image để ở chế độ Private)
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            
            # 3. Kéo bản mới nhất từ Docker Hub về
            docker compose pull
            
            # 4. Tái khởi động các container với image mới
            docker compose up -d
            
            # 5. Dọn dẹp các Image cũ ("rác") để tránh đầy ổ cứng
            docker image prune -f
            
            # 6. Thông báo thành công
            echo "Deploy completed successfully!"